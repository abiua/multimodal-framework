# Frequency ablation: Group A: Full 48kHz — 0–24kHz
data:
  batch_size: 64
  num_workers: 4
  pin_memory: true

  train_path: "data/fish_feeding_local/train"
  val_path: "data/fish_feeding_local/val"
  test_path: "data/fish_feeding_local/test"

  modalities:
    - audio

  loaders:
    audio:
      type: audio_ablation_loader
      extra_params:
        sample_rate: 48000
        max_length: 48000
        n_mels: 128
        time_steps: 224
        n_fft: 2048
        hop_length: 480
        fmax: 24000
        filter_mode: full

  image_size: 224

classes:
  num_classes: 3
  class_names: ["None", "Strong", "Weak"]

model:
  backbones:
    audio:
      type: audio_cnn6
      feature_dim: 256
      pretrained: false
      freeze: false

  fusion_type: concat
  fusion_hidden_dim: 256
  mid_fusion_enabled: false

  dropout_rate: 0.3
  classifier_hidden_dims: [128]

train:
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001

  lr_scheduler: cosine
  warmup_epochs: 5
  step_size: 30
  gamma: 0.1

  optimizer: adamw
  momentum: 0.9

  label_smoothing: 0.1
  mixup_alpha: 0.2
  cutmix_alpha: 0.0

  early_stop:
    enabled: true
    patience: 20
    min_delta: 0.001
    monitor: accuracy
    mode: max

  val_interval: 1

eval:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  confusion_matrix: true

system:
  seed: 42
  gpu_ids: [0, 1, 2, 3]
  distributed: true
  fp16: false

  log_interval: 10
  save_interval: 10

  output_dir: "output/ablation/full_48k"
  resume: ""

  dist_backend: "nccl"
  dist_url: "env://"

  tensorboard_enabled: false
  experiment_name: "ablation_full_48k"
