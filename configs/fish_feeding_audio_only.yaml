# fish_feeding_audio.yaml

data:
  batch_size: 32
  num_workers: 4
  pin_memory: true
  
  train_path: "data/fish_feeding/train"
  val_path: "data/fish_feeding/val"
  test_path: "data/fish_feeding/test"
  
  modalities:
    - audio
  
  loaders:
    audio:
      type: audio_loader
      extra_params:
        sample_rate: 16000
        n_mels: 128
  
  image_size: 224

classes:
  num_classes: 3
  class_names: [None, Strong, Weak]

model:
  backbones:
    audio:
      type: audiocnn
      pretrained: false
      feature_dim: 512
      freeze: false
      extra_params:
        n_mels: 128
  
  fusion_type: attention
  fusion_hidden_dim: 512
  
  dropout_rate: 0.1
  classifier_hidden_dims: [256]

train:
  epochs: 100
  learning_rate: 0.0003
  weight_decay: 0.0001
  lr_scheduler: cosine
  warmup_epochs: 5
  optimizer: adamw
  label_smoothing: 0.1
  early_stop:
    enabled: true
    patience: 25
    min_delta: 0.001
    monitor: accuracy
    mode: max
  val_interval: 5

eval:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  confusion_matrix: true

system:
  seed: 42
  gpu_ids: [0,1,2,3]
  distributed: true
  fp16: false
  log_interval: 20
  save_interval: 10
  output_dir: output/fish_feeding_audio
  resume: ""
  dist_backend: nccl
  dist_url: env://
  tensorboard_enabled: true
  experiment_name: "fish_feeding_audio"