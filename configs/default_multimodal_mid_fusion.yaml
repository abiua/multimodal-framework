data:
  batch_size: 32
  num_workers: 4
  pin_memory: true

  train_path: "data/train"
  val_path: "data/val"
  test_path: "data/test"

  modalities:
    - image
    - audio

  loaders:
    image:
      type: image_loader
      extra_params: {}
    audio:
      type: audio_loader
      extra_params:
        sample_rate: 16000
        max_length: 160000
        n_mels: 128

  image_size: 224

classes:
  num_classes: 10
  class_names:
    - class_0
    - class_1
    - class_2
    - class_3
    - class_4
    - class_5
    - class_6
    - class_7
    - class_8
    - class_9

model:
  backbones:
    image:
      type: resnet18
      pretrained: true
      feature_dim: 512
      freeze: false
      extra_params: {}

    audio:
      type: audiocnn
      pretrained: false
      feature_dim: 512
      freeze: false
      extra_params:
        n_mels: 128

  fusion_type: attention
  fusion_hidden_dim: 512
  mid_fusion_enabled: true

  dropout_rate: 0.1
  classifier_hidden_dims: [256]

train:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001

  lr_scheduler: cosine
  warmup_epochs: 5
  step_size: 30
  gamma: 0.1

  optimizer: adam
  momentum: 0.9

  label_smoothing: 0.1
  mixup_alpha: 0.0
  cutmix_alpha: 0.0

  early_stop:
    enabled: true
    patience: 10
    min_delta: 0.001
    monitor: accuracy
    mode: max

  val_interval: 1

eval:
  metrics: [accuracy, precision, recall, f1]
  save_predictions: true
  confusion_matrix: true

system:
  seed: 42
  gpu_ids: [0]
  distributed: false
  fp16: false

  log_interval: 10
  save_interval: 10

  output_dir: "output/default_multimodal_mid_fusion"
  resume: ""

  dist_backend: "nccl"
  dist_url: "env://"

  tensorboard_enabled: true
  experiment_name: "default_multimodal_mid_fusion"