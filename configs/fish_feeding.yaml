# ============================================================================
# Fish Feeding Intensity 多模态分类配置
# ============================================================================

# ----------------------------------------------------------------------------
# 数据配置
# ----------------------------------------------------------------------------
data:
  batch_size: 32
  num_workers: 4
  pin_memory: true
  
  train_path: "data/fish_feeding/train"
  val_path: "data/fish_feeding/val"
  test_path: "data/fish_feeding/test"
  
  # 使用的模态列表
  modalities:
    - image
    - audio
    - wave
  
  # 每个模态的数据加载器配置
  loaders:
    image:
      type: image_loader
      extra_params: {}
    
    audio:
      type: audio_loader
      extra_params:
        sample_rate: 16000
        n_mels: 128
    
    wave:
      type: wave_loader
      extra_params:
        max_length: 512
        num_features: 6
        normalize: true
  
  image_size: 224

# ----------------------------------------------------------------------------
# 类别配置
# ----------------------------------------------------------------------------
classes:
  num_classes: 3
  class_names:
    - None
    - Strong
    - Weak

# ----------------------------------------------------------------------------
# 模型配置（优化后：只保留 backbones）
# ----------------------------------------------------------------------------
model:
  backbones:
    image:
      type: resnet18
      pretrained: true
      feature_dim: 512
      freeze: false
      extra_params: {}
    
    audio:
      type: audiocnn
      pretrained: false
      feature_dim: 512
      freeze: false
      extra_params:
        n_mels: 128
    
    wave:
      type: tcn
      pretrained: true
      feature_dim: 256
      freeze: false
      extra_params:
        seq_len: 512
        in_channels: 6
        hidden_channels: 64
        n_layers: 6
        kernel_size: 3
  
  # 融合配置（仅多模态时使用）
  fusion_type: attention
  fusion_hidden_dim: 512
  
  # 分类头配置（所有模态共用）
  dropout_rate: 0.1
  classifier_hidden_dims: [256]

# ----------------------------------------------------------------------------
# 训练配置（保持不变）
# ----------------------------------------------------------------------------
train:
  epochs: 100
  learning_rate: 0.0003
  weight_decay: 0.0001
  lr_scheduler: cosine
  warmup_epochs: 5
  optimizer: adamw
  label_smoothing: 0.1
  early_stop:
    enabled: true
    patience: 25
    min_delta: 0.001
    monitor: accuracy
    mode: max
  val_interval: 5

# ----------------------------------------------------------------------------
# 评估配置
# ----------------------------------------------------------------------------
eval:
  metrics:
    - accuracy
    - precision
    - recall
    - f1
  save_predictions: true
  confusion_matrix: true

# ----------------------------------------------------------------------------
# 系统配置
# ----------------------------------------------------------------------------
system:
  seed: 42
  gpu_ids:
    - 0
    - 1
    - 2
    - 3
  distributed: true
  fp16: false
  log_interval: 20
  save_interval: 10
  output_dir: output/fish_feeding_multimodal_4gpu
  resume: ""
  dist_backend: nccl
  dist_url: env://
  tensorboard_enabled: true
  experiment_name: "fish_feeding_multimodal_4gpu"